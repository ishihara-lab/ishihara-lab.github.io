<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイックソートのアニメーション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* JavaScriptから動的に変更されるCSS変数 */
            --transition-speed: 0.4s;
        }

        .animation-container {
            position: relative;
            width: 100%;
            min-height: 450px;
            background-color: #f9fafb;
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
            overflow-x: auto;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
        }
        .array-container {
            display: flex;
            gap: 10px;
            padding: 15px;
            background-color: white;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
            margin-bottom: 250px; /* 履歴マーカーが積まれるための大きな余白 */
        }
        .element {
            width: 50px;
            height: 50px;
            background-color: #60a5fa; /* Blue */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 0.5rem;
            transition: all var(--transition-speed) ease-in-out;
            position: relative;
        }
        .highlight-pivot {
            background-color: #f59e0b; /* Amber */
            transform: translateY(-15px) scale(1.1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }
        .highlight-compare {
            background-color: #facc15; /* Yellow */
            transform: translateY(-10px);
            color: #1f2937;
        }
        .highlight-swap {
            background-color: #ec4899; /* Pink */
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
            z-index: 20;
        }
        .sorted {
            background-color: #22c55e; /* Green */
        }
        
        .region-marker {
            position: absolute;
            height: 4px;
            border-radius: 2px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all calc(var(--transition-speed) * 0.75) ease;
            opacity: 0;
            pointer-events: none;
        }
        .left-marker {
            background-color: #3b82f6; /* Blue */
            color: #3b82f6;
        }
        .right-marker {
            background-color: #ef4444; /* Red */
            color: #ef4444;
        }
        .region-marker span {
            position: absolute;
            bottom: -22px;
            white-space: nowrap;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-primary {
             background-color: #1f2937;
             color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #374151;
        }
        .btn-resume {
            background-color: #059669; /* Emerald */
            color: white;
        }
        .btn-resume:hover:not(:disabled) {
            background-color: #047857;
        }
        .btn-danger {
            background-color: #ef4444; /* Red */
            color: white;
        }
        .btn-danger:hover:not(:disabled) {
            background-color: #dc2626;
        }
        .btn:disabled {
            background-color: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
        }
        .status-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f3f4f6;
            border-radius: 0.5rem;
            min-height: 5rem;
            text-align: center;
            font-family: 'Meiryo', sans-serif;
            font-size: 1.1rem;
            color: #1f2937;
            line-height: 1.6;
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="container mx-auto max-w-5xl bg-white rounded-lg shadow-xl p-6">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">クイックソートのアニメーション</h1>

        <div class="animation-container">
            <div id="array-container" class="array-container">
                <!-- JavaScriptで要素が追加されます -->
            </div>
        </div>

        <div id="controls" class="flex flex-col items-center gap-6 mt-6">
            <!-- スピード調整スライダー -->
            <div class="flex items-center gap-4 w-full max-w-md bg-gray-50 p-4 rounded-lg border border-gray-200">
                <span class="text-gray-600 font-bold text-sm whitespace-nowrap">遅い</span>
                <input type="range" id="speed-slider" min="1" max="100" value="50" class="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-600">
                <span class="text-gray-600 font-bold text-sm whitespace-nowrap">速い</span>
            </div>

            <!-- 操作ボタン群 -->
            <div class="flex justify-center flex-wrap gap-4">
                <button id="start-btn" class="btn btn-primary min-w-[100px]">開始</button>
                <button id="pause-btn" class="btn btn-primary min-w-[120px]" disabled>一時停止</button>
                <button id="step-btn" class="btn btn-primary min-w-[100px]" disabled>コマ送り</button>
                <button id="reset-btn" class="btn btn-danger min-w-[100px]" disabled>リセット</button>
                <button id="new-array-btn" class="btn btn-primary min-w-[140px]">新しい配列</button>
            </div>
        </div>

        <div class="status-box">
            <p id="status-text">「開始」ボタンを押してソートを開始します。</p>
        </div>
    </div>

    <script>
        const arrayContainer = document.getElementById('array-container');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const stepBtn = document.getElementById('step-btn');
        const resetBtn = document.getElementById('reset-btn');
        const newArrayBtn = document.getElementById('new-array-btn');
        const speedSlider = document.getElementById('speed-slider');
        const statusText = document.getElementById('status-text');

        let initialArray = [];
        let elements = [];
        
        let isSorting = false;
        let isPaused = false;
        let stepRequested = false;
        let speedMs = 600; 
        let currentSortId = 0;

        class SortAbortedError extends Error {
            constructor(message) {
                super(message);
                this.name = "SortAbortedError";
            }
        }

        function generateRandomIntArray() {
            const arr = [];
            while (arr.length < 10) {
                const r = Math.floor(Math.random() * 99) + 1;
                if (arr.indexOf(r) === -1) arr.push(r);
            }
            return arr;
        }

        function updateSpeed() {
            const val = speedSlider.value;
            speedMs = 2000 - ((val - 1) * (1900 / 99));
            const transitionSec = Math.max(0.1, (speedMs * 0.7) / 1000);
            document.documentElement.style.setProperty('--transition-speed', `${transitionSec}s`);
        }
        speedSlider.addEventListener('input', updateSpeed);
        updateSpeed();

        async function waitStep(multiplier = 1, sortId) {
            let elapsed = 0;
            const tick = 20; 

            while (true) {
                if (sortId !== currentSortId) throw new SortAbortedError("Sort aborted");

                if (isPaused) {
                    if (stepRequested) {
                        stepRequested = false; 
                        break;
                    }
                } else {
                    elapsed += tick;
                    const totalTimeNeeded = speedMs * multiplier;
                    if (elapsed >= totalTimeNeeded) {
                        break;
                    }
                }
                
                await new Promise(r => setTimeout(r, tick));
            }
        }

        async function swap(idx1, idx2, sortId) {
            const el1 = elements[idx1];
            const el2 = elements[idx2];
            
            el1.classList.add('highlight-swap');
            el2.classList.add('highlight-swap');
            await waitStep(0.8, sortId);
            
            const temp = el1.textContent;
            el1.textContent = el2.textContent;
            el2.textContent = temp;

            await waitStep(0.8, sortId);
            el1.classList.remove('highlight-swap');
            el2.classList.remove('highlight-swap');
        }

        async function partition(low, high, sortId, depth) {
            for (let k = 0; k < elements.length; k++) {
                if (k >= low && k <= high) {
                    elements[k].style.opacity = '1';
                } else {
                    elements[k].style.opacity = '0.3';
                }
            }

            const pivotVal = parseInt(elements[high].textContent);
            elements[high].classList.add('highlight-pivot');
            statusText.innerHTML = `【分割】 基準値（ピボット）として範囲の末尾 <strong>${pivotVal}</strong> を選びました。`;
            
            const leftMarker = document.createElement('div');
            leftMarker.className = 'region-marker left-marker';
            leftMarker.innerHTML = `<span>${pivotVal} 以下</span>`;
            leftMarker.style.bottom = `${-10 - depth * 30}px`;
            
            const rightMarker = document.createElement('div');
            rightMarker.className = 'region-marker right-marker';
            rightMarker.innerHTML = `<span>${pivotVal} より大きい</span>`;
            rightMarker.style.bottom = `${-10 - depth * 30}px`;
            
            arrayContainer.appendChild(leftMarker);
            arrayContainer.appendChild(rightMarker);

            const updateLocalMarkers = (i, j) => {
                if (low <= i) {
                    const leftPos = 15 + low * 60;
                    const rightPos = 15 + i * 60 + 50;
                    leftMarker.style.left = leftPos + 'px';
                    leftMarker.style.width = (rightPos - leftPos) + 'px';
                    leftMarker.style.opacity = '1';
                } else {
                    leftMarker.style.opacity = '0';
                }

                if (i + 1 <= j - 1) {
                    const leftPos = 15 + (i + 1) * 60;
                    const rightPos = 15 + (j - 1) * 60 + 50;
                    rightMarker.style.left = leftPos + 'px';
                    rightMarker.style.width = (rightPos - leftPos) + 'px';
                    rightMarker.style.opacity = '1';
                } else {
                    rightMarker.style.opacity = '0';
                }
            };
            
            await waitStep(1.5, sortId);

            let i = low - 1; 

            for (let j = low; j < high; j++) {
                elements[j].classList.add('highlight-compare');
                updateLocalMarkers(i, j);

                statusText.innerHTML = `要素 <strong>${elements[j].textContent}</strong> と ピボット <strong>${pivotVal}</strong> を比較します。`;
                await waitStep(1, sortId);

                if (parseInt(elements[j].textContent) <= pivotVal) {
                    i++;
                    if (i !== j) {
                        statusText.innerHTML = `<strong>${elements[j].textContent}</strong> は ${pivotVal} 以下なので、左側に集めます（交換）。`;
                        await swap(i, j, sortId);
                    } else {
                        statusText.innerHTML = `<strong>${elements[j].textContent}</strong> は ${pivotVal} 以下なのでそのままです。`;
                        await waitStep(0.5, sortId);
                    }
                    updateLocalMarkers(i, j); 
                } else {
                    statusText.innerHTML = `<strong>${elements[j].textContent}</strong> は ${pivotVal} より大きいのでそのまま右側に残します。`;
                    await waitStep(1, sortId);
                }
                elements[j].classList.remove('highlight-compare');
            }

            if (i + 1 !== high) {
                statusText.innerHTML = `最後に、ピボット <strong>${pivotVal}</strong> を境界位置に移動して確定させます。`;
                await swap(i + 1, high, sortId);
            }
            
            // 修正箇所: i+1 から削除するのではなく、元々ハイライトを付与していた high の要素から削除する
            elements[high].classList.remove('highlight-pivot');
            
            if (low <= i) {
                const leftPos = 15 + low * 60;
                const rightPos = 15 + i * 60 + 50;
                leftMarker.style.left = leftPos + 'px';
                leftMarker.style.width = (rightPos - leftPos) + 'px';
                leftMarker.style.opacity = '0.7'; 
            } else {
                leftMarker.style.opacity = '0';
            }

            if (i + 2 <= high) {
                const leftPos = 15 + (i + 2) * 60;
                const rightPos = 15 + high * 60 + 50;
                rightMarker.style.left = leftPos + 'px';
                rightMarker.style.width = (rightPos - leftPos) + 'px';
                rightMarker.style.opacity = '0.7'; 
            } else {
                rightMarker.style.opacity = '0';
            }
            
            return i + 1;
        }

        async function quickSort(low, high, sortId, depth = 0) {
            if (low < high) {
                let pi = await partition(low, high, sortId, depth);
                
                elements[pi].classList.add('sorted');
                elements[pi].style.opacity = '1';
                statusText.innerHTML = `要素 <strong>${elements[pi].textContent}</strong> の位置が確定しました。`;
                await waitStep(1.2, sortId);

                await quickSort(low, pi - 1, sortId, depth + 1);
                await quickSort(pi + 1, high, sortId, depth + 1);
            } else if (low === high) {
                elements[low].classList.add('sorted');
                elements[low].style.opacity = '1';
                statusText.innerHTML = `要素 <strong>${elements[low].textContent}</strong> の位置が確定しました。`;
                await waitStep(0.8, sortId);
            }
        }

        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.textContent = '再開';
                pauseBtn.classList.remove('btn-primary');
                pauseBtn.classList.add('btn-resume');
                stepBtn.disabled = false;
            } else {
                pauseBtn.textContent = '一時停止';
                pauseBtn.classList.remove('btn-resume');
                pauseBtn.classList.add('btn-primary');
                stepBtn.disabled = true;
            }
        });

        stepBtn.addEventListener('click', () => {
            if (isPaused) {
                stepRequested = true;
            }
        });

        async function startSort() {
            if (isSorting) return;
            isSorting = true;
            currentSortId++; 
            const sortId = currentSortId;

            // ボタンの有効・無効を制御
            startBtn.disabled = true;
            newArrayBtn.disabled = false; 
            pauseBtn.disabled = false;
            stepBtn.disabled = true;
            resetBtn.disabled = false;    
            isPaused = false;
            stepRequested = false;
            
            pauseBtn.textContent = '一時停止';
            pauseBtn.classList.remove('btn-resume');
            pauseBtn.classList.add('btn-primary');
            
            if(startBtn.textContent === 'リピート'){
                handleNewArray(true);
                await new Promise(r => setTimeout(r, 500));
            }

            statusText.innerHTML = "クイックソートを開始します。";
            
            try {
                await waitStep(1, sortId);
                
                await quickSort(0, elements.length - 1, sortId, 0);

                for (let k = 0; k < elements.length; k++) {
                    elements[k].style.opacity = '1';
                    if (!elements[k].classList.contains('sorted')) {
                        elements[k].classList.add('sorted');
                    }
                }

                statusText.innerHTML = "<strong>ソート完了！</strong> すべての要素が正しく並びました。";
            } catch (error) {
                if (error instanceof SortAbortedError) {
                    console.log("Sort aborted.");
                    return; 
                }
                throw error; 
            }

            isSorting = false;
            startBtn.textContent = 'リピート';
            startBtn.disabled = false;
            newArrayBtn.disabled = false;
            pauseBtn.disabled = true;
            stepBtn.disabled = true;
            resetBtn.disabled = true;
        }

        function handleNewArray(keepArray = false) {
            currentSortId++; 
            isSorting = false;
            isPaused = false;
            stepRequested = false;

            if (!keepArray) {
                initialArray = generateRandomIntArray();
            }
            
            pauseBtn.disabled = true;
            stepBtn.disabled = true;
            resetBtn.disabled = true; 
            pauseBtn.textContent = '一時停止';
            pauseBtn.classList.remove('btn-resume');
            pauseBtn.classList.add('btn-primary');
            
            arrayContainer.innerHTML = '';
            elements = [];
            
            initialArray.forEach(val => {
                const el = document.createElement('div');
                el.classList.add('element');
                el.textContent = val;
                arrayContainer.appendChild(el);
                elements.push(el);
            });
            
            statusText.innerHTML = '「開始」ボタンを押してソートを開始します。';
            startBtn.textContent = '開始';
            startBtn.disabled = false;
            newArrayBtn.disabled = false;
        }

        startBtn.addEventListener('click', startSort);
        newArrayBtn.addEventListener('click', () => handleNewArray(false));
        
        // リセットボタンのイベントリスナー
        resetBtn.addEventListener('click', () => {
            handleNewArray(true);
            statusText.innerHTML = '<strong>強制終了しました。</strong> 「開始」ボタンでもう一度最初からやり直します。';
        });

        handleNewArray();
    </script>
</body>
</html>
